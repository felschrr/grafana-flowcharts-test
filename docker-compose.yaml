version: "3.9"

services:
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - grafana-storage:/var/lib/grafana

  drawio:
    image: jgraph/drawio:latest
    container_name: drawio
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP
      - "8443:8443"   # HTTPS
    volumes:
      - drawio-data:/data
    environment:
      DRAWIO_MAX_MEMORY: 1024m
      # LETS_ENCRYPT_ENABLED: "true"   # Décommenter si certificat SSL automatique
      # PUBLIC_DNS: drawio.example.com # Définir si certificat SSL automatique

volumes:
  grafana-storage: {}
  drawio-data: {}
